<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title></title>
  <style id="customCSS"></style>
</head>
<body style="padding:0px; margin:0px;">

	<div id="customHTML" style="position:relative;"></div>
	
	

	<script>
	
		let pages = {
    "Home": {
        "html": "<div id=\"header\">\n    <div id=\"header-title\" onclick=\"showPage('Home')\">Harrison Site</div>\n    <div id=\"header-menu\">\n        <div>Site 1</div>\n        <div>Site 2</div>\n        <div>Site 3</div>\n    </div>\n</div>\n\n<div id=\"content\">\n    <h1>HTML</h1>\n    <textarea editing=\"html\" wrap=\"off\"></textarea>\n\n    <h1>CSS</h1>\n    <textarea editing=\"css\" wrap=\"off\"></textarea>\n\n    <h1>JS</h1>\n    <textarea editing=\"js\" wrap=\"off\"></textarea>\n\n    <button onclick=\"navigator.clipboard.writeText(JSON.stringify(pages, null, 4)); alert('Copied')\">Export</button>\n</div>\n\n\n\n\n\n\n\n",
        "css": "textarea {\n    width:calc(100% - 12px);\n    height:100%;\n    outline:none;\n    border:solid black 1px;\n    border-radius:4px;\n    resize:none;\n    padding:5px;\n    transition: all 0.5s ease-in-out;\n}\n\nh1 {\n    margin: 0px;\n}\n\n#header {\n    width: 100%;\n    height: 200px;\n    display: flex;\n    flex-direction: column;\n    gap: 20px;\n    justify-content: center;\n    align-items: center;\n    background-color: #bbbbbb;\n}\n\n#header-title {\n    font-size: 42px;\n    cursor: pointer;\n}\n\n#header-menu {\n    display: flex;\n    flex-wrap: wrap;\n    justify-content: center;\n    gap: 40px;\n}\n\n#header-menu div {\n    font-size: 20px;\n    cursor: pointer;\n}\n\n\n#content {\n    width: 100%;\n    height: calc(100dvh - 200px);\n    display: flex;\n    flex-direction: column;\n    gap: 5px;\n}\n\n\n\n\n\n\n\n\n\n\n\n\n",
        "js": "document.querySelectorAll('textarea').forEach(elem => {\n    elem.value = pages['Home'][elem.getAttribute(\"editing\")];\n    elem.oninput = () => {pages['Home'][elem.getAttribute(\"editing\")] = elem.value};\n    elem.addEventListener(\"mousedown\", function(e) {\n        document.querySelectorAll('textarea').forEach(e => {e.style.height = \"100%\"});\n        elem.style.height = \"800%\";\n    })\n    elem.addEventListener(\"keydown\", function(e) {\n        if (e.key === \"Tab\") {\n            e.preventDefault();\n            const start = this.selectionStart;\n            const end = this.selectionEnd;\n            this.value = this.value.substring(0, start) + \"    \" + this.value.substring(end);\n            this.selectionStart = this.selectionEnd = start + 4;\n        }\n    })\n})\n\n\n\n\n\n\n"
    }
}
		
		const customHTML = document.getElementById("customHTML");
		const customCSS = document.getElementById("customCSS");
	
		function showPage(pageName) {
			if (pages[pageName].html) customHTML.innerHTML = pages[pageName].html;
			if (pages[pageName].css) customCSS.innerHTML = pages[pageName].css;
			if (pages[pageName].js) new Function(pages[pageName].js)();
		}
	
		showPage("Home");
	
	</script>
</body>
</html>
