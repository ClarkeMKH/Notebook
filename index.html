			const customCSS = document.getElementById("customCSS");

			let scripts = {
			    "Home": "customCSS.innerHTML = `\n    #page {\n        width: 100%;\n        height: 100%;\n        background-color: #444444;\n    }\n\n    #page * {\n        font-family: \"Roboto Mono\", monospace;\n        font-optical-sizing: auto;\n        color: #eeeeee;\n    }\n\n    #page-header {\n        width: calc(100% - 40px);\n        padding: 20px;\n        gap: 20px;\n    }\n\n    #page-header-options {\n        position: fixed;\n        padding: 0px;\n        width: 40px;\n        height: 40px;\n        top: 10px;\n        right: 10px;\n    }\n\n    #page-header-title {\n        font-size: 46px;\n        text-align: center;\n    }\n\n    #page-header-selection {\n        display: flex;\n        justify-content: space-around;\n        gap: 20px;\n        flex-wrap: wrap;\n    }\n\n    #page-header-selection div {\n        flex-wrap: wrap;\n        \n    }\n\n    #page-content {\n        width: calc(100% - 20px);\n        height: calc(100% - 20px);\n        padding: 10px;\n        overflow: auto;\n        scrollbar-width: none;\n    }\n\n    #page-menu {\n        display: none;\n        position: fixed;\n        width: 400px;\n        height: calc(60% - 20px);\n        top: 20%;\n        left: calc(50% - 210px);\n        background-color: #444444;\n        border: solid #111111 2px;\n        border-radius: 8px;\n        box-shadow: 2px 2px 4px #111111;\n        padding: 10px;\n        gap: 10px;\n        transition: all 1s;\n        justify-content: left;\n        overflow-y: auto;\n        scrollbar-width: none;\n    }\n\n    @media (max-width: 600px) {\n        #page-menu {\n            width: calc(90% - 20px);\n            height: calc(90% - 20px);\n            top: 5%;\n            left: 5%;\n        }\n    }\n\n    #page-menu div {\n        width: calc(100% - 40px);\n    }\n\n    #page-menu-close {\n        position: absolute;\n        top: 8px;\n        right: 8px;\n        width: 20px !important;\n        height: 20px;\n        font-size: 14px;\n        padding: 5px !important;\n    }\n\n    #page-menu-title {\n        font-size: 32px;\n        padding: 40px 20px 10px 20px;\n    }\n\n    .button {\n        display: flex;\n        justify-content: center;\n        align-items: center;\n        text-align: center;\n        border: solid 1px #111111;\n        border-radius: 8px;\n        cursor: pointer;\n        padding: 5px 20px;\n        font-size: 20px;\n        box-shadow: 1px 1px 2px #111111;\n    }\n\n    .center {\n        display: flex;\n        flex-direction: column;\n        justify-content: center;\n        align-items: center;\n    }\n\n    .homeTextArea {\n        width: calc(100% - 12px);\n        height: calc(100% - 12px);\n        padding: 5px;\n        border: solid 1px #111111;\n        border-radius: 8px;\n        outline: none;\n        resize: none;\n        scrollbar-color: #eeeeee transparent;\n        background-color: #333333;\n    }\n`;\n\n\n\n\n\n\ncustomHTML.innerHTML = `\n    <div id=\"page\" class=\"center\">\n        <div id=\"page-header\" class=\"center\">\n            <div id=\"page-header-options\" class=\"button\" onclick=\"showMenu()\">E</div>\n            <div id=\"page-header-title\">Harrison Home</div>\n            <div id=\"page-header-selection\"></div>\n        </div>\n        <div id=\"page-content\" class=\"center\">\n            <textarea id=\"page-content-textarea\" class=\"homeTextArea\" wrap=\"off\" placeholder=\"Notes\"></textarea>\n        </div>\n        <div id=\"page-menu\" class=\"center\"></div>\n    </div>\n`;\n\n\n\n\n\n\n\nconst pageHeaderSelection = document.getElementById(\"page-header-selection\");\nconst pageContentText = document.getElementById(\"page-content-textarea\");\nconst menu = document.getElementById(\"page-menu\");\nwindow.contentArea = document.getElementById(\"page-content\");\n\nif (\"#Notes\" in scripts) {\n    pageContentText.value = scripts[\"#Notes\"];\n    pageContentText.addEventListener('input', function(e) {\n        scripts[\"#Notes\"] = pageContentText.value;\n        saveToCache(\"scripts\", scripts);\n    })\n} else {\n    pageContentText.value = \"NOTES REMOVED FROM SCRIPTS\\n\\nTEMPORARY TEXT\"\n}\n\nwindow.textAreaTabFunctionality = function(txtArea) {\n    txtArea.addEventListener('keydown', function(e) {\n        if (e.key === 'Tab') {\n            e.preventDefault();\n            const start = this.selectionStart;\n            const end = this.selectionEnd;\n            const spaces = '    ';\n            this.value = this.value.substring(0, start) + spaces + this.value.substring(end);\n            this.selectionStart = this.selectionEnd = start + spaces.length;\n        }\n    });\n}\n\n\ntextAreaTabFunctionality(pageContentText);\n\n\nfor (const script in scripts) {\n    if (script == \"Notes\" || script.startsWith(\"#\")) continue;\n    const div = document.createElement(\"div\");\n    div.innerHTML = (script == \"Home\") ? \"Notes\" : script;\n    div.classList.add(\"button\");\n    div.onclick = async function() {\n        runScript(script);\n    }\n    pageHeaderSelection.appendChild(div);\n}\n\n\n\n\n\n\nwindow.showMenu = function() {\n    menu.style.display = \"flex\";\n    menu.style.height = \"\";\n    menu.style.width = \"\";\n    menu.style.top = \"\";\n    menu.style.left = \"\";\n    menu.innerHTML = `\n        <div id=\"page-menu-close\" class=\"button\">X</div>\n        <div id=\"page-menu-title\" class=\"center\">Settings</div>\n    `;\n\n    document.getElementById(\"page-menu-close\").onclick = function() {\n        menu.style.display = \"none\";\n    }\n\n    for (const script in scripts) {\n        if (script == \"Notes\" || script.startsWith('#')) continue;\n        const div = document.createElement(\"div\");\n        div.innerHTML = `Edit ${script}`;\n        div.classList.add(\"button\");\n        div.onclick = function() {editScript(script);}\n        menu.appendChild(div);\n    }\n    const newScript = document.createElement(\"div\");\n    newScript.innerHTML = `<i>New Script</i>`;\n    newScript.classList.add(\"button\");\n    newScript.style.marginTop = \"40px\";\n    newScript.onclick = function() {\n        const scriptName = prompt(\"Please enter the Name of the script\");\n        if (scriptName != \"\" && !(scriptName in scripts)) {\n            scripts[scriptName] = \"// JS GOES HERE\";\n            editScript(scriptName);\n        }\n    }\n    menu.appendChild(newScript);\n    const importScripts = document.createElement(\"div\");\n    importScripts.innerHTML = `<i>Import Scripts</i>`;\n    importScripts.classList.add(\"button\");\n    importScripts.onclick = function() {\n        const fileInput = document.createElement(\"input\");\n        fileInput.type = \"file\";\n        fileInput.accept = \".json,application/json\";\n        fileInput.click();\n        fileInput.addEventListener(\"change\", async (event) => {\n            const file = event.target.files[0];\n            if (!file) return;\n            try {\n                const text = await file.text();\n                const json = JSON.parse(text);\n                scripts = json;\n                runScript('Home');\n            } catch (err) {\n                console.error(\"Invalid JSON file:\", err);\n                alert(\"Failed to load JSON file.\");\n            }\n        })\n        fileInput.value = \"\";\n    }\n    menu.appendChild(importScripts);\n    const exportScripts = document.createElement(\"div\");\n    exportScripts.innerHTML = `<i>Export Scripts</i>`;\n    exportScripts.classList.add(\"button\");\n    exportScripts.onclick = function() {\n        const jsonString = JSON.stringify(scripts, null, 4);\n        const blob = new Blob([jsonString], { type: \"application/json\" });\n        const url = URL.createObjectURL(blob);\n        const a = document.createElement(\"a\");\n        a.href = url;\n        a.download = \"scripts.json\";\n        a.click();\n        URL.revokeObjectURL(url);\n    }\n    menu.appendChild(exportScripts);\n}\n\n\nfunction editScript(scriptID) {\n    menu.style.height = \"calc(90% - 20px)\";\n    menu.style.width = \"calc(90% - 20px)\";\n    menu.style.top = \"5%\";\n    menu.style.left = \"5%\";\n\n    menu.innerHTML = `\n        <textarea id=\"page-menu-editTextArea\" class=\"homeTextArea\" wrap=\"off\"></textarea>\n        <div id=\"page-menu-saveText\" class=\"button\" >Save</div>\n    `;\n\n    const txt = document.getElementById(\"page-menu-editTextArea\");\n    const saveBtn= document.getElementById(\"page-menu-saveText\");\n    textAreaTabFunctionality(txt);\n    txt.value = scripts[scriptID];\n    saveBtn.onclick = function() {\n        scripts[scriptID] = txt.value;\n        saveToCache(\"scripts\", scripts);\n        navigator.clipboard.writeText(\"Hi\")\n        navigator.clipboard.writeText(JSON.stringify(scripts, null, 4));\n        showMenu();\n    }\n}\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n",
			    "#Notes": "------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n\n\n// ===== CHOCO =====\n\nPDF-XChange Editor\nchoco install pdfxchangeeditor -y\n\nGoogle Chrome\nchoco install googlechrome -y --ignore-checksums\n\nGoogle Earth Pro\nchoco install googleearthpro -y\n\nAutoDesk Fusion360\nchoco install autodesk-fusion360 -y\n\nDell Command Update\nchoco install dellcommandupdate -y\n\nLogi Options+\nchoco install logitech-options-plus -y\n\nVLC Media Player\nchoco install vlc -y\n\nFoxit PDF Reader\nchoco install foxitreader -y\n\nPaint.NET\nchoco install paint.net -y\n\nVSCode\nchoco install vscode -y\n\nNodeJS\nchoco install nodejs -y\n\n\n\n--force (Force Reinstalls)\n\n--ignore-checksums (Ignores Checksums)\n\n\n\n\n// ===== CONTROL PANEL =====\n\nSOUND DEVICES\n    mmsys.cpl\n\nNETWORK CONNECTIONS\n    ncpa.cpl\n\nPROFILES AND USERS\n    lusrmgr.msc\n    sysdm.cpl\n\n\n\n// ===== SCAN DRIVE FOR ERRORS =====\nchkdsk C: /scan\n\n\n\n\n// ===== CHANGE PASSWORD FOR LOCAL PROFILE =====\nnet user \"username\" *\n\n\n\n\n// ===== CHECK ARCHIVE ENABLED =====\n\nGet-Mailbox <user mailbox> | Select DisplayName, ArchiveStatus\n\n\n\n// ===== KICK START MOVE TO ARCHIVE =====\nStart-ManagedFolderAssistant -Identity <user mailbox>\n \n\n\n// ===== ENABLE AUTO-EXPANDING ARCHIVE =====\nEnable-Mailbox <user mailbox> -AutoExpandingArchive\n\n\n\n// ===== CHECK AUTO-EXPANDING ARCHIVE IS TRUE =====\nGet-Mailbox <user mailbox> | FL AutoExpandingArchiveEnabled\n\n\n\n\n",
			    "Generate Password": "const words3 = [\n    \"ace\",\"age\",\"air\",\"ant\",\"ape\",\"arc\",\"arm\",\"art\",\"bag\",\"bar\",\n    \"bay\",\"bed\",\"bee\",\"bin\",\"box\",\"bus\",\"cab\",\"can\",\"cap\",\"car\",\n    \"cat\",\"cup\",\"day\",\"den\",\"dew\",\"dog\",\"dot\",\"ear\",\"eat\",\"egg\",\n    \"end\",\"eye\",\"fan\",\"far\",\"fig\",\"fin\",\"fit\",\"fix\",\"fly\",\"fog\",\n    \"fox\",\"fun\",\"gap\",\"gas\",\"gel\",\"gem\",\"get\",\"gym\",\"hat\",\"hen\",\n    \"hip\",\"ice\",\"ink\",\"jam\",\"jar\",\"jet\",\"job\",\"joy\",\"key\",\"kid\",\n    \"kit\",\"lab\",\"lap\",\"law\",\"led\",\"leg\",\"lid\",\"lip\",\"log\",\"lot\",\n    \"map\",\"mat\",\"mix\",\"mop\",\"net\",\"new\",\"nod\",\"nut\",\"oak\",\"oil\",\n    \"one\",\"orb\",\"owl\",\"pad\",\"pan\",\"pen\",\"pet\",\"pie\",\"pin\",\"pod\",\n    \"pop\",\"pot\",\"row\",\"rug\",\"run\",\"sea\",\"sky\",\"sun\",\"tag\",\"top\"\n];\n\nconst words4 = [\n    \"able\",\"area\",\"atom\",\"away\",\"baby\",\"back\",\"ball\",\"band\",\"bank\",\"base\",\n    \"bath\",\"bean\",\"bell\",\"belt\",\"best\",\"bird\",\"blue\",\"boat\",\"body\",\"book\",\n    \"both\",\"bowl\",\"bulk\",\"busy\",\"cafe\",\"cake\",\"calm\",\"camp\",\"card\",\"care\",\n    \"cash\",\"cell\",\"chat\",\"city\",\"club\",\"coat\",\"code\",\"coin\",\"cold\",\"cook\",\n    \"cool\",\"copy\",\"core\",\"cost\",\"crew\",\"data\",\"date\",\"dawn\",\"deal\",\"desk\",\n    \"dial\",\"disk\",\"door\",\"draw\",\"drop\",\"dust\",\"duty\",\"earn\",\"easy\",\"edge\",\n    \"else\",\"exam\",\"face\",\"fact\",\"fair\",\"farm\",\"fast\",\"feed\",\"file\",\"film\",\n    \"find\",\"fish\",\"flag\",\"flat\",\"flow\",\"food\",\"foot\",\"form\",\"fund\",\"game\",\n    \"gate\",\"gift\",\"gold\",\"good\",\"gray\",\"grow\",\"hall\",\"hand\",\"head\",\"help\",\n    \"hill\",\"home\",\"hope\",\"idea\",\"join\",\"jump\",\"keep\",\"kind\",\"lamp\",\"land\"\n];\n\nconst words5 = [\n    \"apple\",\"badge\",\"basic\",\"beach\",\"begin\",\"bench\",\"black\",\"blank\",\"block\",\"board\",\n    \"brain\",\"brand\",\"bread\",\"brick\",\"bring\",\"broad\",\"brown\",\"build\",\"cable\",\"carry\",\n    \"chair\",\"chart\",\"clean\",\"clear\",\"clerk\",\"clock\",\"cloud\",\"coach\",\"coast\",\"color\",\n    \"count\",\"cover\",\"craft\",\"cream\",\"dance\",\"daily\",\"dream\",\"drink\",\"drive\",\"earth\",\n    \"elite\",\"enjoy\",\"enter\",\"event\",\"field\",\"final\",\"floor\",\"focus\",\"frame\",\"fresh\",\n    \"front\",\"fruit\",\"glass\",\"globe\",\"grace\",\"grade\",\"grand\",\"grass\",\"green\",\"group\",\n    \"guide\",\"happy\",\"heart\",\"honey\",\"horse\",\"hotel\",\"house\",\"image\",\"index\",\"input\",\n    \"jelly\",\"judge\",\"layer\",\"learn\",\"light\",\"lunch\",\"magic\",\"major\",\"metal\",\"model\",\n    \"money\",\"motor\",\"music\",\"night\",\"north\",\"novel\",\"ocean\",\"offer\",\"olive\",\"paint\",\n    \"paper\",\"peace\",\"piano\",\"plant\",\"plate\",\"point\",\"power\",\"print\",\"prize\",\"queen\"\n];\n\nconst specials = [\"!\", \"@\", \"#\", \"$\", \"%\", \"&\", \"*\", \"?\"];\n\n\n\nfunction randomItem(arr) {\n    return arr[Math.floor(Math.random() * arr.length)];\n}\n\n\n\nfunction capitalize(word) {\n    return word.charAt(0).toUpperCase() + word.slice(1);\n}\n\n\n\nfunction shuffle(arr) {\n    for (let i = arr.length - 1; i > 0; i--) {\n        const j = Math.floor(Math.random() * (i + 1));\n        [arr[i], arr[j]] = [arr[j], arr[i]];\n    }\n    return arr;\n}\n\n\n\nfunction generatePassword() {\n    let selectedWords = [\n        randomItem(words3),\n        randomItem(words4),\n        randomItem(words5)\n    ];\n    const capIndex = Math.floor(Math.random() * selectedWords.length);\n    selectedWords[capIndex] = capitalize(selectedWords[capIndex]);\n    const symbol = randomItem(specials);\n    const digit = Math.floor(Math.random() * 10).toString();\n    const firstWordIndex = Math.floor(Math.random() * selectedWords.length);\n    const firstWord = selectedWords.splice(firstWordIndex, 1)[0];\n    const remainingParts = [\n        ...selectedWords,\n        symbol,\n        digit\n    ];\n    shuffle(remainingParts);\n    return firstWord + remainingParts.join(\"\");\n}\n\n\nconst pw = generatePassword();\nnavigator.clipboard.writeText(pw);\nalert(`Copied Password : ${pw}`);\n\n\n\n\n\n",
			    "Label Maker": "contentArea.innerHTML = `\n\n    <style>\n\n    #labelMakerOuter {\n        width: 100%;\n        height: 100%;\n    }\n\n    #labelMaker {\n        max-width: calc(100%  - 140px);\n        max-height: calc(100%  - 140px);\n        border: solid #111111 4px;\n        border-radius: 40px;\n        background-color: #666666;\n        padding: 40px;\n        gap: 20px;\n        box-shadow: 2px 2px 4px #111111;\n        overflow: auto;\n        scrollbar-width: none;\n    }\n\n    #labelMaker input {\n        background-color: #444444;\n        border: solid 2px #111111;\n        border-radius: 8px;\n        font-size: 28px;\n        padding: 5px;\n        text-align: center;\n        width: calc(100% - 14px);\n    }\n\n    #labelMaker-title {\n        font-size: 40px;\n    }\n\n    #labelMaker-asset {\n        display: flex;\n        align-items: center;\n        gap: 10px;\n    }\n\n    #labelMaker-asset-query {\n        min-width: 40px;\n        min-height: 40px;\n        width: 40px;\n        height: 40px;\n        padding: 0px;\n    }\n\n    #labelMaker-download {\n        padding: 5px 40px;\n        font-size: 26px;\n    }\n\n    </style>\n\n\n\n\n\n    <div id=\"labelMakerOuter\" class=\"center\">\n        <div id=\"labelMaker\" class=\"center\">\n            <div id=\"labelMaker-title\">Label Maker</div>\n            <input id=\"labelMaker-customer\" placeholder=\"Customer\"></input>\n            <div id=\"labelMaker-asset\">\n                <input id=\"labelMaker-asset-input\" placeholder=\"Asset Serial\"></input>\n                <div id=\"labelMaker-asset-query\" class=\"button\"  onclick=\"alert('If you want to download multiple labels at once, enter the serial numbers separated by a comma.')\">i</div>\n            </div>\n            <div id=\"labelMaker-download\" class=\"button\">Download</div>\n        </div>\n    </div>\n`;\n\n\nconst customerInput = document.getElementById(\"labelMaker-customer\");\nconst assetInput = document.getElementById(\"labelMaker-asset-input\");\n\ndocument.getElementById(\"labelMaker-download\").onclick = function() {\n    downloadLabel();\n};\n\nfunction wait(ms) {\n    return new Promise(resolve => setTimeout(resolve, ms));\n}\n\nasync function drawLabel(customer, serial) {\n\n    const cnv = document.createElement(\"canvas\");\n    const ctx = cnv.getContext(\"2d\");\n\n    cnv.width = 900;\n    cnv.height = 250;\n    ctx.fillStyle = \"white\";\n    ctx.fillRect(0, 0, cnv.width, cnv.height);\n\n    let qrcodeDiv = document.createElement(\"div\");\n    qrcodeDiv.id = \"qrcode\";\n    qrcodeDiv.style.display = \"none\";\n    document.body.appendChild(qrcodeDiv);\n\n    let barcodeDiv = document.createElement(\"canvas\");\n    barcodeDiv.id = \"barcode\";\n    barcodeDiv.style.display = \"none\";\n    document.body.appendChild(barcodeDiv);\n\n    new QRCode(document.getElementById(\"qrcode\"), {\n        text: serial,\n        width: 200,\n        height: 200,\n        colorDark: \"#000000\",\n        colorLight: \"#ffffff\",\n        correctLevel: QRCode.CorrectLevel.H\n    });\n\n    JsBarcode(\"#barcode\", serial, {\n        width: 4,\n        height: 80,\n        displayValue: false\n    });\n\n    const qrcode = new Image();\n    qrcode.src = document.querySelector(\"#qrcode canvas\").toDataURL(\"image/png\");\n\n    const barcode = new Image();\n    barcode.src = document.getElementById(\"barcode\").toDataURL(\"image/png\");\n\n    ctx.imageSmoothingEnabled = false;\n\n    qrcode.onload = () => {\n        ctx.drawImage(qrcode, 600, 25, 200, 200);\n        qrcodeDiv.remove();\n    };\n\n    drawCenteredText(ctx, customer, 100, 20, 475, 55, \"bold 24px Verdana\");\n\n    barcode.onload = () => {\n        ctx.drawImage(barcode, 150, 70, 375, 85);\n        barcodeDiv.remove();\n    };\n\n    drawCenteredText(ctx, serial, 75, 150, 525, 55, \"bold 32px Verdana\");\n    drawCenteredText(ctx, \"www.crosstek.co.uk\", 75, 205, 525, 20, \"bold 24px Verdana\");\n\n    await wait(500);\n\n    return cnv;\n}\n\nasync function drawCenteredText(ctx, text, x, y, w, h, font) {\n    ctx.font = font;\n    ctx.textAlign = \"center\";\n    ctx.textBaseline = \"middle\";\n    ctx.fillStyle = \"black\";\n\n    const words = text.split(\" \");\n    const lines = [];\n    let currentLine = words[0];\n\n    for (let i = 1; i < words.length; i++) {\n        const testLine = currentLine + \" \" + words[i];\n        const metrics = ctx.measureText(testLine);\n\n        if (metrics.width < w) {\n            currentLine = testLine;\n        } else {\n            lines.push(currentLine);\n            currentLine = words[i];\n        }\n    }\n\n    lines.push(currentLine);\n\n    const fontSize = parseInt(font.match(/\\d+/)[0]);\n    const lineHeight = fontSize * 1.2;\n    const totalHeight = lines.length * lineHeight;\n    let startY = y + (h - totalHeight) / 2 + lineHeight / 2;\n\n    for (let i = 0; i < lines.length; i++) {\n        ctx.fillText(lines[i], x + w / 2, startY + i * lineHeight);\n    }\n}\n\nasync function downloadLabel(customer = customerInput.value, serial = assetInput.value) {\n    const serials = serial.split(\",\");\n    const cnv = document.createElement(\"canvas\");\n\n    document.getElementById(\"labelMaker\").innerHTML = `\n        <div id=\"labelMaker-title\">Creating</div>\n    `;\n\n    cnv.width = 900;\n    cnv.height = 250;\n\n    const ctx = cnv.getContext(\"2d\");\n\n    if (serials.length > 1) {\n        const zip = {};\n\n        for (let i = 0; i < serials.length; i++) {\n            ctx.fillStyle = \"white\";\n            ctx.fillRect(0, 0, cnv.width, cnv.height);\n            ctx.drawImage(await drawLabel(customer, serials[i]), 0, 0);\n\n            const tempCnv = document.createElement(\"canvas\");\n            const tempCtx = tempCnv.getContext(\"2d\");\n\n            tempCnv.width = 900;\n            tempCnv.height = 250;\n\n            tempCtx.drawImage(cnv, 0, 0);\n\n            zip[`Serial - ${serials[i]}.png`] = tempCnv;\n        }\n\n        downloadZip(zip, `${customer} Labels`);\n    } else {\n        ctx.fillStyle = \"white\";\n        ctx.fillRect(0, 0, cnv.width, cnv.height);\n        ctx.drawImage(await drawLabel(customer, serials[0]), 0, 0);\n\n        const link = document.createElement(\"a\");\n\n        console.log(`${customer} - ${serials[0]}.png`);\n\n        link.download = `${customer} - ${serials[0]}.png`;\n        link.href = cnv.toDataURL(\"image/png\");\n        link.click();\n    }\n\n    document.getElementById(\"labelMaker\").innerHTML = `\n        <div id=\"labelMaker-title\">Label's Downloaded</div>\n    `;\n}\n\nasync function downloadZip(contents, name) {\n    const zip = new JSZip();\n\n    async function search(obj, fld) {\n        for (const key in obj) {\n            if (\n                typeof obj[key] === \"object\" &&\n                obj[key] !== null &&\n                !Array.isArray(obj[key]) &&\n                !(obj[key] instanceof HTMLElement)\n            ) {\n                await search(obj[key], fld.folder(key));\n            } else {\n                const type = key.split(\".\").pop();\n\n                if (type == \"json\" || type == \"txt\" || type == \"html\") {\n                    fld.file(key, obj[key]);\n                }\n\n                if (type == \"png\") {\n                    async function canvasToPngBlob(canvas) {\n                        const bitmap = await createImageBitmap(canvas);\n                        const off = new OffscreenCanvas(bitmap.width, bitmap.height);\n\n                        off.getContext(\"2d\").drawImage(bitmap, 0, 0);\n\n                        return off.convertToBlob({ type: \"image/png\" });\n                    }\n\n                    const blob = await canvasToPngBlob(obj[key]);\n                    fld.file(key, blob);\n                }\n            }\n        }\n    }\n\n    await search(contents, zip);\n\n    async function generateAndDownload() {\n        const content = await zip.generateAsync({ type: \"blob\" });\n        const link = document.createElement(\"a\");\n\n        link.href = URL.createObjectURL(content);\n        link.download = `${name}.zip`;\n        link.click();\n\n        URL.revokeObjectURL(link.href);\n    }\n\n    await generateAndDownload();\n}\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n",

			    "MFA": "window.TOTP = {\n    async generate(secret, options = {}) {\n        const digits = options.digits ?? 6;\n        const period = options.period ?? 30;\n\n        const epoch = Math.floor(Date.now() / 1000);\n        const counter = Math.floor(epoch / period);\n\n        const key = base32ToBytes(secret);\n        const msg = counterToBytes(counter);\n\n        const cryptoKey = await crypto.subtle.importKey(\n            \"raw\",\n            key,\n            { name: \"HMAC\", hash: \"SHA-1\" },\n            false,\n            [\"sign\"]\n        );\n\n        const hmac = new Uint8Array(\n            await crypto.subtle.sign(\"HMAC\", cryptoKey, msg)\n        );\n\n        const offset = hmac[hmac.length - 1] & 0xf;\n\n        const binary =\n            ((hmac[offset] & 0x7f) << 24) |\n            ((hmac[offset + 1] & 0xff) << 16) |\n            ((hmac[offset + 2] & 0xff) << 8) |\n            (hmac[offset + 3] & 0xff);\n\n        const code = String(binary % 10 ** digits).padStart(digits, \"0\");\n        const timeRemaining = period - (epoch % period);\n\n        return { code, timeRemaining };\n    }\n};\n\nfunction base32ToBytes(base32) {\n    const alphabet = \"ABCDEFGHIJKLMNOPQRSTUVWXYZ234567\";\n    const clean = base32.replace(/=+$/, \"\").replace(/\\s+/g, \"\").toUpperCase();\n\n    let bits = \"\";\n\n    for (const char of clean) {\n        const val = alphabet.indexOf(char);\n        if (val === -1) throw new Error(\"Invalid base32 character\");\n        bits += val.toString(2).padStart(5, \"0\");\n    }\n\n    const bytes = [];\n    for (let i = 0; i + 8 <= bits.length; i += 8) {\n        bytes.push(parseInt(bits.slice(i, i + 8), 2));\n    }\n\n    return new Uint8Array(bytes);\n}\n\nfunction counterToBytes(counter) {\n    const bytes = new Uint8Array(8);\n\n    for (let i = 7; i >= 0; i--) {\n        bytes[i] = counter & 0xff;\n        counter = Math.floor(counter / 256);\n    }\n\n    return bytes;\n}\n\n\n\n\n\n// Example usage\nconst { code, timeRemaining } = await TOTP.generate(\"SECRET\");\n\nalert(`MFA Code : ${code}\\nSeconds remaining : ${timeRemaining}`);",

			    "OpenSCAD": "const module = await import(\"./modules/openscad.js\");\nconst OpenSCAD = module.default;\n\ncontentArea.innerHTML = `\n\n    <style>\n        #scadArea {\n            width: 100%;\n            height: 100%;\n            display: flex;\n            gap: 5px;\n        }\n\n        #scadArea > * {\n            width: 100%;\n            height: 100%;\n            display: flex;\n            flex-direction: column;\n            gap: 5px;\n        }\n\n        #btnArea {\n            display: flex;\n            gap: 5px;\n        }\n\n        #btnArea div {\n            width: 100%;\n        }\n\n        #scadInput {\n            width: calc(100% - 12px);\n            height: calc(100% - 12px);\n            padding: 5px;\n            border: solid 1px #111111;\n            border-radius: 8px;\n            outline: none;\n            resize: none;\n            scrollbar-color: #eeeeee transparent;\n            background-color: #333333;\n        }\n\n        #scadCanvas {\n            border: solid 1px #111111;\n            border-radius: 8px;\n            outline: none;\n            background-color: #333333;\n        }\n\n    </style>\n\n    <div id=\"scadArea\">\n        <div>\n            <textarea id=\"scadInput\" wrap=\"off\"></textarea>\n            <div id=\"btnArea\">\n                <div id=\"cheatSheetBtn\" class=\"button\">Cheat Sheet</div>\n                <div id=\"renderBtn\" class=\"button\">Render</div>\n                <div id=\"downloadBtn\" class=\"button\">Download</div>\n            </div>\n        </div>\n        <div>\n            <canvas id=\"scadCanvas\"></canvas>\n        </div>\n    </div>\n`;\n\nconst scadInput = document.getElementById(\"scadInput\");\n\ntextAreaTabFunctionality(scadInput);\n\n\n\n\nif (!(\"#OpenSCADCode\" in scripts)) scripts[\"#OpenSCADCode\"] = \"\";\n\nscadInput.value = scripts[\"#OpenSCADCode\"];\n\nscadInput.addEventListener('input', function(e) {\n    scripts[\"#OpenSCADCode\"] = scadInput.value;\n    saveToCache(\"scripts\", scripts);\n})\n\n\n\n\n\nasync function createOpenSCAD() {\n    return await OpenSCAD({\n        noInitialRun: true,\n        noExitRuntime: true,\n        locateFile: path => \"./modules/\" + path\n    });\n}\n\n\n\n\n\n\n\n\nasync function compileOpenSCAD() {\n    const code = scadInput.value;\n\n    const inputFile = \"/input.scad\";\n    const outputFile = \"/output.stl\";\n\n    try {\n        const scad = await createOpenSCAD();\n\n        scad.FS.writeFile(inputFile, code);\n\n        scad.callMain([\n            inputFile,\n            \"--enable=manifold\",\n            \"-o\",\n            outputFile\n        ]);\n\n        const stlData = scad.FS.readFile(outputFile);\n\n        const stlBuffer = stlData.buffer.slice(\n            stlData.byteOffset,\n            stlData.byteOffset + stlData.byteLength\n        );\n\n        currentSTLBuffer = stlBuffer;\n\n        displaySTL(stlBuffer);\n\n    } catch (err) {\n        console.error(\"OpenSCAD error:\", err);\n        alert(\"OpenSCAD compile failed: \" + err);\n    }\n}\n\n\n\n\n\n\n// button clicks\ndocument.getElementById(\"cheatSheetBtn\").addEventListener(\"click\", () => {\n    window.open('https://openscad.org/cheatsheet/', '_blank', 'noopener,noreferrer');\n});\n\ndocument.getElementById(\"renderBtn\").addEventListener(\"click\", compileOpenSCAD);\n\ndocument.getElementById(\"downloadBtn\").addEventListener(\"click\", () => {\n    if (!currentSTLBuffer) {\n        alert(\"Render the model before downloading.\");\n        return;\n    }\n\n    const blob = new Blob([currentSTLBuffer], {\n        type: \"model/stl\"\n    });\n\n    const url = URL.createObjectURL(blob);\n\n    const a = document.createElement(\"a\");\n    a.href = url;\n    a.download = \"Model.stl\";\n    document.body.appendChild(a);\n    a.click();\n\n    a.remove();\n    URL.revokeObjectURL(url);\n});\n\n\n\n\nconst canvas = document.querySelector(\"#scadCanvas\");\nlet currentSTLBuffer = null;\nlet currentMesh = null;\nlet isDragging = false;\nlet isPanning = false;\nlet previousMouse = { x: 0, y: 0 };\n\nconst scene = new THREE.Scene();\n\nTHREE.Object3D.DEFAULT_UP.set(0, 0, 1);\n\nconst grid = new THREE.GridHelper(400, 400);\ngrid.rotation.x = Math.PI / 2; // put grid on XY plane, Z is up\nscene.add(grid);\n\nconst axes = new THREE.AxesHelper(10);\nscene.add(axes);\n\nconst rect = canvas.parentElement.getBoundingClientRect();\n\nconst camera = new THREE.PerspectiveCamera(\n    75,\n    rect.width / rect.height,\n    0.1,\n    100000\n);\n\nconst renderer = new THREE.WebGLRenderer({\n    canvas,\n    antialias: true\n});\n\nrenderer.setSize(rect.width, rect.height);\nrenderer.setPixelRatio(window.devicePixelRatio || 1);\n\nlet cameraTarget = new THREE.Vector3(0, 0, 0);\nlet cameraDistance = 40;\nlet azimuth = -Math.PI / 3;\nlet elevation = Math.PI / 4;\n\nfunction updateCamera() {\n    elevation = Math.max(\n        -Math.PI / 2 + 0.01,\n        Math.min(Math.PI / 2 - 0.01, elevation)\n    );\n    camera.position.set(\n        cameraTarget.x + cameraDistance * Math.cos(elevation) * Math.cos(azimuth),\n        cameraTarget.y + cameraDistance * Math.cos(elevation) * Math.sin(azimuth),\n        cameraTarget.z + cameraDistance * Math.sin(elevation)\n    );\n\n    camera.up.set(0, 0, 1);\n    camera.lookAt(cameraTarget);\n}\n\nfunction animate() {\n    requestAnimationFrame(animate);\n    renderer.render(scene, camera);\n}\n\nupdateCamera();\nanimate();\n\ncanvas.addEventListener(\"mousedown\", e => {\n    e.preventDefault();\n\n    if (e.button === 0) isDragging = true;\n    if (e.button === 1) isPanning = true;\n\n    previousMouse.x = e.clientX;\n    previousMouse.y = e.clientY;\n});\n\nwindow.addEventListener(\"mouseup\", () => {\n    isDragging = false;\n    isPanning = false;\n});\n\nwindow.addEventListener(\"mousemove\", e => {\n    const dx = e.clientX - previousMouse.x;\n    const dy = e.clientY - previousMouse.y;\n\n    if (isDragging) {\n        azimuth , 0, 0);\n\n    scene.add(currentMesh);\n\n    const box = new THREE.Box3().setFromObject(currentMesh);\n    const center = new THREE.Vector3();\n    const size = new THREE.Vector3();\n\n    box.getCenter(center);\n    box.getSize(size);\n\n    cameraTarget.copy(center);\n\n    const maxSize = Math.max(size.x, size.y, size.z);\n    const fov = camera.fov * Math.PI / 180;\n\n    //cameraDistance = Math.abs(maxSize / Math.sin(fov / 2)) * 1.8;\n\n    if (!Number.isFinite(cameraDistance) || cameraDistance <= 0) {\n        cameraDistance = 10;\n    }\n\n    camera.near = Math.max(cameraDistance / 1000, 0.01);\n    camera.far = cameraDistance * 1000;\n    camera.updateProjectionMatrix();\n\n    // Starting angled view\n    //azimuth = -Math.PI / 2;\n    //elevation = Math.PI / 5;\n\n    updateCamera();\n}\n\n\n\nfunction parseSTL(data) {\n\n    const buffer =\n        data instanceof ArrayBuffer\n            ? data\n            : data.buffer;\n\n    const view = new DataView(buffer);\n\n    // Detect binary STL\n    const faceCount = view.getUint32(80, true);\n    const expectedSize = 84 + faceCount * 50;\n\n    const geometry = new THREE.BufferGeometry();\n\n    // BINARY STL\n    if (expectedSize === buffer.byteLength) {\n\n        const vertices = new Float32Array(faceCount * 9);\n        const normals = new Float32Array(faceCount * 9);\n\n        let offset = 84;\n\n        for (let face = 0; face < faceCount; face++) {\n\n            const nx = view.getFloat32(offset, true);\n            const ny = view.getFloat32(offset + 4, true);\n            const nz = view.getFloat32(offset + 8, true);\n\n            offset += 12;\n\n            for (let i = 0; i < 3; i++) {\n\n                const index = face * 9 + i * 3;\n\n                vertices[index]     = view.getFloat32(offset, true);\n                vertices[index + 1] = view.getFloat32(offset + 4, true);\n                vertices[index + 2] = view.getFloat32(offset + 8, true);\n\n                normals[index]     = nx;\n                normals[index + 1] = ny;\n                normals[index + 2] = nz;\n\n                offset += 12;\n            }\n\n            offset += 2; // attribute byte count\n        }\n\n        geometry.setAttribute(\n            \"position\",\n            new THREE.BufferAttribute(vertices, 3)\n        );\n\n        geometry.setAttribute(\n            \"normal\",\n            new THREE.BufferAttribute(normals, 3)\n        );\n\n    } else {\n\n        // ASCII STL\n        const text = new TextDecoder().decode(buffer);\n\n        const vertices = [];\n        const normals = [];\n\n        const faceRegex = /facet[\\s\\S]*?normal\\s+([^\\s]+)\\s+([^\\s]+)\\s+([^\\s]+)[\\s\\S]*?outer loop([\\s\\S]*?)endloop[\\s\\S]*?endfacet/g;\n\n        let match;\n\n        while ((match = faceRegex.exec(text)) !== null) {\n\n            const nx = parseFloat(match[1]);\n            const ny = parseFloat(match[2]);\n            const nz = parseFloat(match[3]);\n\n            const vertexRegex = /vertex\\s+([^\\s]+)\\s+([^\\s]+)\\s+([^\\s]+)/g;\n\n            let vertexMatch;\n\n            while ((vertexMatch = vertexRegex.exec(match[4])) !== null) {\n\n                vertices.push(\n                    parseFloat(vertexMatch[1]),\n                    parseFloat(vertexMatch[2]),\n                    parseFloat(vertexMatch[3])\n                );\n\n                normals.push(nx, ny, nz);\n            }\n        }\n\n        geometry.setAttribute(\n            \"position\",\n            new THREE.Float32BufferAttribute(vertices, 3)\n        );\n\n        geometry.setAttribute(\n            \"normal\",\n            new THREE.Float32BufferAttribute(normals, 3)\n        );\n    }\n\n    geometry.computeBoundingBox();\n    geometry.computeBoundingSphere();\n\n    return geometry;\n}",

			const AsyncFunction = Object.getPrototypeOf(async function(){}).constructor;
			
			async function runScript(key) {

			const dbPromise = new Promise(resolve => {
				const request = indexedDB.open("cacheDB", 1);

				return dbPromise.then(db => new Promise(resolve => {

						const value = req.result ?? null;
						resolve(value);

			}
