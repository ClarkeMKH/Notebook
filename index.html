<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title></title>
  <style id="pageCSS"></style>
</head>
<body style="padding:0px; margin:0px;">

	<div id="pageHTML" style="position:relative;"></div>
	
	

	<script>
	
		let pages = {
			"Home": {
				"html": "<style>\n     #header {\n        width: 100%;\n        height: 200px;\n        display: flex;\n        flex-direction: column;\n        gap: 20px;\n        justify-content: center;\n        align-items: center;\n        background-color: #bbbbbb;\n    }\n\n    #header-title {\n        font-size: 42px;\n        cursor: pointer;\n    }\n\n    #header-menu {\n        display: flex;\n        flex-wrap: wrap;\n        justify-content: center;\n        gap: 40px;\n    }\n\n    #header-menu div {\n        font-size: 20px;\n        cursor: pointer;\n    }\n\n    #content {\n        width: 100%;\n        height: calc(100dvh - 200px);\n        display: flex;\n        flex-direction: column;\n        gap: 5px;\n    }\n</style>\n\n<div id=\"header\">\n    <div id=\"header-title\" onclick=\"showPage('Home')\">Harrison Site</div>\n    <div id=\"header-menu\">\n        <div page=\"Test Page\">Site 1</div>\n    </div>\n</div>\n\n\n\n\n\n<div id=\"content\">\n    <div id=\"pages-list\"></div>\n\n    <h1>HTML</h1>\n    <textarea editing=\"html\" wrap=\"off\"></textarea>\n\n    <h1>CSS</h1>\n    <textarea editing=\"css\" wrap=\"off\"></textarea>\n\n    <h1>JS</h1>\n    <textarea editing=\"js\" wrap=\"off\"></textarea>\n\n    <button onclick=\"navigator.clipboard.writeText(JSON.stringify(pages, null, 4)); alert('Copied')\">Export</button>\n</div>\n\n\n\n\n\n\n\n",
				"css": "textarea {\n    width:calc(100% - 12px);\n    height:100%;\n    outline:none;\n    border:solid black 1px;\n    border-radius:4px;\n    resize:none;\n    padding:5px;\n    transition: all 0.5s ease-in-out;\n}\n\n\n\nh1 {\n    margin: 0px;\n}\n\n\n\n#pages-list {\n    display: flex;\n    gap: 40px;\n    border: solid #000000 1px;\n    border-radius: 8xp;\n    cursor: pointer;\n    padding: 10px;\n    font-size: 20px;\n}\n\n\n\n\n\n\n\n\n\n\n\n",
				"js": "\n\ndocument.querySelectorAll('textarea').forEach(elem => {\n    elem.value = pages['Home'][elem.getAttribute(\"editing\")];\n    elem.oninput = () => {pages['Home'][elem.getAttribute(\"editing\")] = elem.value};\n    elem.addEventListener(\"mousedown\", function(e) {\n        document.querySelectorAll('textarea').forEach(e => {e.style.height = \"100%\"});\n        elem.style.height = \"800%\";\n    })\n    elem.addEventListener(\"keydown\", function(e) {\n        if (e.key === \"Tab\") {\n            e.preventDefault();\n            const start = this.selectionStart;\n            const end = this.selectionEnd;\n            this.value = this.value.substring(0, start) + \"    \" + this.value.substring(end);\n            this.selectionStart = this.selectionEnd = start + 4;\n        }\n    })\n})\n\n\n\ndocument.querySelectorAll('#header-menu div').forEach((elem, index) => {\n    elem.onclick = function() {\n        console.log(elem.getAttribute('page'))\n        if (elem.getAttribute('page') in pages) showPage(elem.getAttribute('page'), document.getElementById('content'))\n    }\n})\n\n\n\nfor (const page in pages) {\n    const pageDiv = document.createElement(\"div\");\n    pageDiv.textContent = page;\n    pageDiv.onclick = function() {\n        document.querySelectorAll('textarea').forEach(elem => {\n            elem.value = pages[page][elem.getAttribute(\"editing\")];\n            elem.oninput = () => {pages[page][elem.getAttribute(\"editing\")] = elem.value};\n        });\n    }\n    document.getElementById(\"pages-list\").appendChild(pageDiv);\n}\n\n\n\n"
			},
			"Test Page": {
				"html": "<div id=\"booking\">\n    <div id=\"calendar\">\n        <div id=\"monthArea\">March 2026</div>\n        <div id=\"dateArea\">\n            <div id=\"daysOfWeek\">\n                <div>SUN</div>\n                <div>MON</div>\n                <div>TUE</div>\n                <div>WED</div>\n                <div>THU</div>\n                <div>FRI</div>\n                <div>SAT</div>\n            </div>\n            <div id=\"datesRow0\">\n                <div style=\"cell\"></div>\n                <div style=\"cell\"></div>\n                <div style=\"cell\"></div>\n                <div style=\"cell\"></div>\n                <div style=\"cell\"></div>\n                <div style=\"cell\"></div>\n                <div style=\"cell\"></div>\n            </div>\n            <div id=\"datesRow1\">\n                <div style=\"cell\"></div>\n                <div style=\"cell\"></div>\n                <div style=\"cell\"></div>\n                <div style=\"cell\"></div>\n                <div style=\"cell\"></div>\n                <div style=\"cell\"></div>\n                <div style=\"cell\"></div>\n            </div>\n            <div id=\"datesRow2\">\n                <div style=\"cell\"></div>\n                <div style=\"cell\"></div>\n                <div style=\"cell\"></div>\n                <div style=\"cell\"></div>\n                <div style=\"cell\"></div>\n                <div style=\"cell\"></div>\n                <div style=\"cell\"></div>\n            </div>\n            <div id=\"datesRow3\">\n                <div style=\"cell\"></div>\n                <div style=\"cell\"></div>\n                <div style=\"cell\"></div>\n                <div style=\"cell\"></div>\n                <div style=\"cell\"></div>\n                <div style=\"cell\"></div>\n                <div style=\"cell\"></div>\n            </div>\n            <div id=\"datesRow4\">\n                <div style=\"cell\"></div>\n                <div style=\"cell\"></div>\n                <div style=\"cell\"></div>\n                <div style=\"cell\"></div>\n                <div style=\"cell\"></div>\n                <div style=\"cell\"></div>\n                <div style=\"cell\"></div>\n            </div>\n        </div>\n        <div id=\"timeArea\"></div>\n    </div>\n</div>",
				"css": "#booking {\n    width: 100%;\n    height: 100%;\n    display: flex;\n    flex-direction: column;\n    justify-content: center;\n    align-items: center;\n    text-align: center;\n}\n\n#booking * {\n    display: flex;\n    flex-direction: column;\n    justify-content: center;\n    align-items: center;\n    text-align: center;\n    color: #111111;\n    font-family: Tahoma, sans-serif;\n}\n\n\n#calendar {\n    width: 800px;\n    height: 600px;\n    border: solid #dddddd 2px;\n    border-radius: 8px;\n    gap: 2px;\n}\n\n#calendar div {\n    background-color: #ffffff;\n    border-radius: 8px;\n}\n\n#monthArea {\n    width: calc(100% - 20px);\n    font-size: 32px;\n    padding: 10px;\n    align-items: start;\n}\n\n#dateArea {\n    width: 100%;\n    height: 100%;\n}\n\n\n#dateArea * {\n    width: 100%;\n    height: 100%;\n    font-size: 24px;\n    flex-direction: row;\n}\n\n\n#timeArea {\n    width: 100%;\n    min-height: 100px;\n    height: 100px;\n}\n\n\n\n\n",
				"js": ""
			}
		}
		
		const pageHTML = document.getElementById("pageHTML");
		const pageCSS = document.getElementById("pageCSS");
	
		function showPage(pageName, htmlParent=pageHTML, cssParent=pageCSS) {
			if (pages[pageName].html) htmlParent.innerHTML = pages[pageName].html;
			if (pages[pageName].css) cssParent.innerHTML = pages[pageName].css;
			if (pages[pageName].js) new Function(pages[pageName].js)();
		}
	
		showPage("Home");
	
	</script>
</body>
</html>
