<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta name="description" content="My Website">
		<meta name="author" content="Clarke Harrison">
		
		<title>CH</title>
		
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">

		<!-- Favicon -->
		<link rel="icon" href="/icon.png" type="image/x-icon">

		<style id="customCSS"></style>
	</head>
	<body style="width:100%; height:100dvh; margin:0px; padding:0px; overflow:hidden;">

		<div id="customHTML" style="width:100%; height:100%;"></div>

		<script src="/modules/qrCode.js"></script>
		<script src="/modules/barcode.js"></script>
		<script src="/modules/kaplay.js"></script>
		<script src="/modules/zipGenerator.js"></script>
		<script src="/modules/three.js"></script>
		<script src="/modules/pdf-lib.js"></script>

		
		<script>
			const customCSS = document.getElementById("customCSS");
			const customHTML = document.getElementById("customHTML");
			let scripts = {
			    "Home": "customCSS.innerHTML = `\n    #page {\n        width: 100%;\n        height: 100%;\n        background-color: #444444;\n    }\n\n    #page * {\n        font-family: \"Roboto Mono\", monospace;\n        font-optical-sizing: auto;\n        color: #eeeeee;\n    }\n\n    #page-header {\n        width: calc(100% - 40px);\n        padding: 20px;\n        gap: 20px;\n    }\n\n    #page-header-options {\n        position: fixed;\n        padding: 0px;\n        width: 40px;\n        height: 40px;\n        top: 10px;\n        right: 10px;\n    }\n\n    #page-header-title {\n        font-size: 46px;\n        text-align: center;\n    }\n\n    #page-header-selection {\n        display: flex;\n        justify-content: space-around;\n        gap: 20px;\n        flex-wrap: wrap;\n    }\n\n    #page-header-selection div {\n        flex-wrap: wrap;\n        \n    }\n\n    #page-content {\n        width: calc(100% - 20px);\n        height: calc(100% - 20px);\n        padding: 10px;\n        overflow: auto;\n        scrollbar-width: none;\n    }\n\n    #page-menu {\n        display: none;\n        position: fixed;\n        width: 400px;\n        height: calc(60% - 20px);\n        top: 20%;\n        left: calc(50% - 210px);\n        background-color: #444444;\n        border: solid #111111 2px;\n        border-radius: 8px;\n        box-shadow: 2px 2px 4px #111111;\n        padding: 10px;\n        gap: 10px;\n        transition: all 1s;\n        justify-content: left;\n        overflow-y: auto;\n        scrollbar-width: none;\n    }\n\n    @media (max-width: 600px) {\n        #page-menu {\n            width: calc(90% - 20px);\n            height: calc(90% - 20px);\n            top: 5%;\n            left: 5%;\n        }\n    }\n\n    #page-menu div {\n        width: calc(100% - 40px);\n    }\n\n    #page-menu-close {\n        position: absolute;\n        top: 8px;\n        right: 8px;\n        width: 20px !important;\n        height: 20px;\n        font-size: 14px;\n        padding: 5px !important;\n    }\n\n    #page-menu-title {\n        font-size: 32px;\n        padding: 40px 20px 10px 20px;\n    }\n\n    .button {\n        display: flex;\n        justify-content: center;\n        align-items: center;\n        text-align: center;\n        border: solid 1px #111111;\n        border-radius: 8px;\n        cursor: pointer;\n        padding: 5px 20px;\n        font-size: 20px;\n        box-shadow: 1px 1px 2px #111111;\n    }\n\n    .center {\n        display: flex;\n        flex-direction: column;\n        justify-content: center;\n        align-items: center;\n    }\n\n    .homeTextArea {\n        width: calc(100% - 12px);\n        height: calc(100% - 12px);\n        padding: 5px;\n        border: solid 1px #111111;\n        border-radius: 8px;\n        outline: none;\n        resize: none;\n        scrollbar-color: #eeeeee transparent;\n        background-color: #333333;\n    }\n`;\n\n\n\n\n\n\ncustomHTML.innerHTML = `\n    <div id=\"page\" class=\"center\">\n        <div id=\"page-header\" class=\"center\">\n            <div id=\"page-header-options\" class=\"button\" onclick=\"showMenu()\">E</div>\n            <div id=\"page-header-title\">Harrison Home</div>\n            <div id=\"page-header-selection\"></div>\n        </div>\n        <div id=\"page-content\" class=\"center\">\n            <textarea id=\"page-content-textarea\" class=\"homeTextArea\" wrap=\"off\" placeholder=\"Notes\"></textarea>\n        </div>\n        <div id=\"page-menu\" class=\"center\"></div>\n    </div>\n`;\n\n\n\n\n\n\n\nconst pageHeaderSelection = document.getElementById(\"page-header-selection\");\nconst pageContentText = document.getElementById(\"page-content-textarea\");\nconst menu = document.getElementById(\"page-menu\");\nwindow.contentArea = document.getElementById(\"page-content\");\n\nif (\"#Notes\" in scripts) {\n    pageContentText.value = scripts[\"#Notes\"];\n    pageContentText.addEventListener('input', function(e) {\n        scripts[\"#Notes\"] = pageContentText.value;\n        saveToCache(\"scripts\", scripts);\n    })\n} else {\n    pageContentText.value = \"NOTES REMOVED FROM SCRIPTS\\n\\nTEMPORARY TEXT\"\n}\n\nwindow.textAreaTabFunctionality = function(txtArea) {\n    txtArea.addEventListener('keydown', function(e) {\n        if (e.key === 'Tab') {\n            e.preventDefault();\n            const start = this.selectionStart;\n            const end = this.selectionEnd;\n            const spaces = '    ';\n            this.value = this.value.substring(0, start) + spaces + this.value.substring(end);\n            this.selectionStart = this.selectionEnd = start + spaces.length;\n        }\n    });\n}\n\n\ntextAreaTabFunctionality(pageContentText);\n\n\nfor (const script in scripts) {\n    if (script == \"Notes\" || script.startsWith(\"#\")) continue;\n    const div = document.createElement(\"div\");\n    div.innerHTML = (script == \"Home\") ? \"Notes\" : script;\n    div.classList.add(\"button\");\n    div.onclick = async function() {\n        runScript(script);\n    }\n    pageHeaderSelection.appendChild(div);\n}\n\n\n\n\n\n\nwindow.showMenu = function() {\n    menu.style.display = \"flex\";\n    menu.style.height = \"\";\n    menu.style.width = \"\";\n    menu.style.top = \"\";\n    menu.style.left = \"\";\n    menu.innerHTML = `\n        <div id=\"page-menu-close\" class=\"button\">X</div>\n        <div id=\"page-menu-title\" class=\"center\">Settings</div>\n    `;\n\n    document.getElementById(\"page-menu-close\").onclick = function() {\n        menu.style.display = \"none\";\n    }\n\n    for (const script in scripts) {\n        if (script == \"Notes\" || script.startsWith('#')) continue;\n        const div = document.createElement(\"div\");\n        div.innerHTML = `Edit ${script}`;\n        div.classList.add(\"button\");\n        div.onclick = function() {editScript(script);}\n        menu.appendChild(div);\n    }\n    const newScript = document.createElement(\"div\");\n    newScript.innerHTML = `<i>New Script</i>`;\n    newScript.classList.add(\"button\");\n    newScript.style.marginTop = \"40px\";\n    newScript.onclick = function() {\n        const scriptName = prompt(\"Please enter the Name of the script\");\n        if (scriptName != \"\" && !(scriptName in scripts)) {\n            scripts[scriptName] = \"// JS GOES HERE\";\n            editScript(scriptName);\n        }\n    }\n    menu.appendChild(newScript);\n    const importScripts = document.createElement(\"div\");\n    importScripts.innerHTML = `<i>Import Scripts</i>`;\n    importScripts.classList.add(\"button\");\n    importScripts.onclick = function() {\n        const fileInput = document.createElement(\"input\");\n        fileInput.type = \"file\";\n        fileInput.accept = \".json,application/json\";\n        fileInput.click();\n        fileInput.addEventListener(\"change\", async (event) => {\n            const file = event.target.files[0];\n            if (!file) return;\n            try {\n                const text = await file.text();\n                const json = JSON.parse(text);\n                scripts = json;\n                runScript('Home');\n            } catch (err) {\n                console.error(\"Invalid JSON file:\", err);\n                alert(\"Failed to load JSON file.\");\n            }\n        })\n        fileInput.value = \"\";\n    }\n    menu.appendChild(importScripts);\n    const exportScripts = document.createElement(\"div\");\n    exportScripts.innerHTML = `<i>Export Scripts</i>`;\n    exportScripts.classList.add(\"button\");\n    exportScripts.onclick = function() {\n        const jsonString = JSON.stringify(scripts, null, 4);\n        const blob = new Blob([jsonString], { type: \"application/json\" });\n        const url = URL.createObjectURL(blob);\n        const a = document.createElement(\"a\");\n        a.href = url;\n        a.download = \"scripts.json\";\n        a.click();\n        URL.revokeObjectURL(url);\n    }\n    menu.appendChild(exportScripts);\n}\n\n\nfunction editScript(scriptID) {\n    menu.style.height = \"calc(90% - 20px)\";\n    menu.style.width = \"calc(90% - 20px)\";\n    menu.style.top = \"5%\";\n    menu.style.left = \"5%\";\n\n    menu.innerHTML = `\n        <textarea id=\"page-menu-editTextArea\" class=\"homeTextArea\" wrap=\"off\"></textarea>\n        <div id=\"page-menu-saveText\" class=\"button\" >Save</div>\n    `;\n\n    const txt = document.getElementById(\"page-menu-editTextArea\");\n    const saveBtn= document.getElementById(\"page-menu-saveText\");\n    textAreaTabFunctionality(txt);\n    txt.value = scripts[scriptID];\n    saveBtn.onclick = function() {\n        scripts[scriptID] = txt.value;\n        saveToCache(\"scripts\", scripts);\n        navigator.clipboard.writeText(\"Hi\")\n        navigator.clipboard.writeText(JSON.stringify(scripts, null, 4));\n        showMenu();\n    }\n}\n\n\n\n\n\n\n\n\n\n\n\nwindow.AI={\n    webllm:null,\n    engine:null,\n    messages:[{role:\"system\",content:\"You are a helpful AI assistant.\"}],\n    async init(){\n        if(this.webllm)return;\n        this.webllm=await import(\"/modules/webllm.js\");\n    },\n    async loadModel(model='Llama-3.2-1B-Instruct-q4f16_1-MLC'){\n        await this.init();\n        if(this.engine)return this.engine;\n        this.engine=await this.webllm.CreateMLCEngine(model,{\n            initProgressCallback:p=> {\n                console.log(`${p.text.startsWith(\"Fetching\") ? \"Downloading\" : \"Loading\"} Model : ${Math.floor(p.progress*100)}%`);\n            }\n        });\n        return this.engine;\n    },\n    async ask(prompt,respond,options={}){\n        const engine=await this.loadModel();\n        this.messages.push({role:\"user\",content:prompt});\n        const stream=await engine.chat.completions.create({\n            messages:this.messages,\n            stream:true,\n            temperature:options.temperature||0.7,\n            max_tokens:options.max_tokens||300\n        });\n        let response=\"\";\n        for await(const chunk of stream){\n            const token=chunk.choices?.[0]?.delta?.content||\"\";\n            response+=token;\n            respond(token);\n        }\n        respond(\"#END#\");\n        this.messages.push({role:\"assistant\",content:response});\n        return response;\n    },\n    clearChat(){\n        this.messages=[{role:\"system\",content:\"You are a helpful AI assistant.\"}];\n    },\n    unloadModel(){\n        this.engine=null;\n        if(globalThis.gc)gc();\n        console.log(\"Model unloaded from memory.\");\n    },\n    async deleteDownloadedModels(reload=true){\n        this.engine=null;\n        for(const key of await caches.keys()){\n            const k=key.toLowerCase();\n            if(k.includes(\"webllm\")||k.includes(\"mlc\")||k.includes(\"model\")){\n                await caches.delete(key);\n            }\n        }\n        if(indexedDB.databases){\n            for(const db of await indexedDB.databases()){\n                const name=db.name?.toLowerCase()||\"\";\n                if(name.includes(\"webllm\")||name.includes(\"mlc\")||name.includes(\"model\")){\n                    indexedDB.deleteDatabase(db.name);\n                }\n            }\n        }\n        console.log(\"All downloaded AI models deleted.\");\n        if(reload)location.reload();\n    },\n    async listAllModels(){\n        await this.init();\n        console.table(\n            this.webllm.prebuiltAppConfig.model_list.map(m => ({\n                id:m.model_id,\n                vram:m.vram_required_MB,\n                lowResource:m.low_resource_required\n            }))\n        );\n    }\n}\n\n\n\n\n\n\n\n\n",
			    "#Notes": "------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------------------------------------\n\n\n\n\n\n// ===== CHOCO =====\n\nPDF-XChange Editor\nchoco install pdfxchangeeditor -y\n\nGoogle Chrome\nchoco install googlechrome -y --ignore-checksums\n\nGoogle Earth Pro\nchoco install googleearthpro -y\n\nAutoDesk Fusion360\nchoco install autodesk-fusion360 -y\n\nDell Command Update\nchoco install dellcommandupdate -y\n\nLogi Options+\nchoco install logitech-options-plus -y\n\nVLC Media Player\nchoco install vlc -y\n\nFoxit PDF Reader\nchoco install foxitreader -y\n\nPaint.NET\nchoco install paint.net -y\n\nVSCode\nchoco install vscode -y\n\nNodeJS\nchoco install nodejs -y\n\n\n\n--force (Force Reinstalls)\n\n--ignore-checksums (Ignores Checksums)\n\n\n\n\n// ===== CONTROL PANEL =====\n\nSOUND DEVICES\n    mmsys.cpl\n\nNETWORK CONNECTIONS\n    ncpa.cpl\n\nPROFILES AND USERS\n    lusrmgr.msc\n    sysdm.cpl\n\n\n\n// ===== SCAN DRIVE FOR ERRORS =====\nchkdsk C: /scan\n\n\n\n\n// ===== CHANGE PASSWORD FOR LOCAL PROFILE =====\nnet user \"username\" *\n\n\n\n\n// ===== CHECK ARCHIVE ENABLED =====\n\nGet-Mailbox <user mailbox> | Select DisplayName, ArchiveStatus\n\n\n\n// ===== KICK START MOVE TO ARCHIVE =====\nStart-ManagedFolderAssistant -Identity <user mailbox>\n \n\n\n// ===== ENABLE AUTO-EXPANDING ARCHIVE =====\nEnable-Mailbox <user mailbox> -AutoExpandingArchive\n\n\n\n// ===== CHECK AUTO-EXPANDING ARCHIVE IS TRUE =====\nGet-Mailbox <user mailbox> | FL AutoExpandingArchiveEnabled\n\n\n\n\n",
			}
			const defaultScripts = JSON.parse(JSON.stringify(scripts));
			
			
			const AsyncFunction = Object.getPrototypeOf(async function(){}).constructor;
			
			async function runScript(key) {
			    await new AsyncFunction(scripts[key])();
			}
			
			const dbPromise = new Promise(resolve => {
				const request = indexedDB.open("cacheDB", 1);
				request.onupgradeneeded = () => request.result.createObjectStore("ch");
				request.onsuccess = () => resolve(request.result);
			});



			function saveToCache(key, value) {
				dbPromise.then(db => db.transaction("ch", "readwrite").objectStore("ch").put(value, key));
			}

			function loadFromCache(key) {
				return dbPromise.then(db => new Promise(resolve => {
					const req = db.transaction("ch").objectStore("ch").get(key);
					req.onsuccess = () => {
						const value = req.result ?? null;
						resolve(value);
					};
				}));
			}

			function deleteFromCache(key) {
				dbPromise.then(db => db.transaction("ch", "readwrite").objectStore("ch").delete(key));
			}

			function resetCache() {
				dbPromise.then(db => {
					db.close();
					return new Promise(resolve => indexedDB.deleteDatabase("cacheDB").onsuccess = resolve);
				});
			}

			loadFromCache("scripts").then((e) => {
				try {
					if (e) scripts = e;
					runScript('Home');
				} catch {
					alert("! Error !\n\nUsing Default Scripts with broken scripts object accessible via : brokenScripts");
					window.brokenScripts = e;
					scripts = defaultScripts;
					runScript('Home');
				}
			})
		</script>
	</body>
</html>
