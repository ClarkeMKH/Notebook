<body style="padding:0px; margin:0px;">

	<div id="pageHTML" style="position:relative;"></div>
	
	

	<script>
	
		let pages = {
    "Home": {
        "html": "<style>\n     #header {\n        width: 100%;\n        height: 200px;\n        display: flex;\n        flex-direction: column;\n        gap: 20px;\n        justify-content: center;\n        align-items: center;\n        background-color: #bbbbbb;\n    }\n\n    #header-title {\n        font-size: 42px;\n        cursor: pointer;\n    }\n\n    #header-menu {\n        display: flex;\n        flex-wrap: wrap;\n        justify-content: center;\n        gap: 40px;\n    }\n\n    #header-menu div {\n        font-size: 20px;\n        cursor: pointer;\n    }\n\n    #content {\n        width: 100%;\n        height: calc(100dvh - 200px);\n        display: flex;\n        flex-direction: column;\n        gap: 5px;\n    }\n</style>\n\n<div id=\"header\">\n    <div id=\"header-title\" onclick=\"showPage('Home')\">Harrison Site</div>\n    <div id=\"header-menu\">\n        <div page=\"Booking Page\">Booking Page</div>\n    </div>\n</div>\n\n\n\n\n\n<div id=\"content\">\n    <div id=\"pages-list\"></div>\n\n    <h1>HTML</h1>\n    <textarea editing=\"html\" wrap=\"off\"></textarea>\n\n    <h1>CSS</h1>\n    <textarea editing=\"css\" wrap=\"off\"></textarea>\n\n    <h1>JS</h1>\n    <textarea editing=\"js\" wrap=\"off\"></textarea>\n\n    <button onclick=\"navigator.clipboard.writeText(JSON.stringify(pages, null, 4)); alert('Copied')\">Export</button>\n</div>\n\n\n\n\n\n\n\n",
        "css": "textarea {\n    width:calc(100% - 12px);\n    height:100%;\n    outline:none;\n    border:solid black 1px;\n    border-radius:4px;\n    resize:none;\n    padding:5px;\n    transition: all 0.5s ease-in-out;\n}\n\n\n\nh1 {\n    margin: 0px;\n}\n\n\n\n#pages-list {\n    width: calc(100% - 10px);\n    display: flex;\n    gap: 5px;\n    border: solid #000000 1px;\n    border-radius: 8xp;\n    cursor: pointer;\n    padding: 5px;\n    font-size: 20px;\n}\n\n#pages-list div {\n    height: calc(100% - 10px);\n    border-radius: 8px;\n    padding: 5px 20px;\n}\n\n#pages-list div:hover {\n    background-color: #cccccc;\n    transition: background-color 0.3s ease;\n}\n\n\n\n\n\n\n\n\n\n\n",
        "js": "\n\ndocument.querySelectorAll('textarea').forEach(elem => {\n    elem.value = pages['Home'][elem.getAttribute(\"editing\")];\n    elem.oninput = () => {pages['Home'][elem.getAttribute(\"editing\")] = elem.value};\n    elem.addEventListener(\"mousedown\", function(e) {\n        document.querySelectorAll('textarea').forEach(e => {e.style.height = \"100%\"});\n        elem.style.height = \"800%\";\n    })\n    elem.addEventListener(\"keydown\", function(e) {\n        if (e.key === \"Tab\") {\n            e.preventDefault();\n            const start = this.selectionStart;\n            const end = this.selectionEnd;\n            this.value = this.value.substring(0, start) + \"    \" + this.value.substring(end);\n            this.selectionStart = this.selectionEnd = start + 4;\n        }\n    })\n})\n\n\n\ndocument.querySelectorAll('#header-menu div').forEach((elem, index) => {\n    elem.onclick = function() {\n        console.log(elem.getAttribute('page'))\n        if (elem.getAttribute('page') in pages) showPage(elem.getAttribute('page'), document.getElementById('content'))\n    }\n})\n\n\n\nfor (const page in pages) {\n    const pageDiv = document.createElement(\"div\");\n    pageDiv.textContent = page;\n    pageDiv.onclick = function() {\n        document.querySelectorAll('textarea').forEach(elem => {\n            elem.value = pages[page][elem.getAttribute(\"editing\")];\n            elem.oninput = () => {pages[page][elem.getAttribute(\"editing\")] = elem.value};\n        });\n    }\n    document.getElementById(\"pages-list\").appendChild(pageDiv);\n}\n\n\n\n"
    },
    "Booking Page": {
        "html": "<div id=\"booking\">\n    <div id=\"booking-calendar\">\n        <div id=\"booking-monthArea\"></div>\n        <div id=\"booking-dateArea\">\n            <div id=\"booking-daysOfWeek\">\n                <div>SUN</div>\n                <div>MON</div>\n                <div>TUE</div>\n                <div>WED</div>\n                <div>THU</div>\n                <div>FRI</div>\n                <div>SAT</div>\n            </div>\n            <div id=\"booking-datesRow0\">\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n            </div>\n            <div id=\"booking-datesRow1\">\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n            </div>\n            <div id=\"booking-datesRow2\">\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n            </div>\n            <div id=\"booking-datesRow3\">\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n            </div>\n            <div id=\"booking-datesRow4\">\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n            </div>\n            <div id=\"booking-datesRow5\">\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n                <div class=\"booking-cell\"></div>\n            </div>\n        </div>\n        <div id=\"booking-timeArea\"></div>\n    </div>\n</div>",
        "css": "#booking {\n    width: 100%;\n    height: 100%;\n    display: flex;\n    flex-direction: column;\n    justify-content: center;\n    align-items: center;\n    text-align: center;\n}\n\n#booking * {\n    display: flex;\n    flex-direction: column;\n    justify-content: center;\n    align-items: center;\n    text-align: center;\n    color: #444444;\n    font-family: Tahoma, sans-serif;\n}\n\n\n#booking-calendar {\n    width: 800px;\n    height: 800px;\n    border: solid #dddddd 2px;\n    border-radius: 8px;\n    gap: 2px;\n}\n\n#booking-monthArea {\n    width: calc(100% - 20px);\n    font-size: 38px;\n    padding: 10px;\n    align-items: start;\n}\n\n#booking-dateArea {\n    width: calc(100% - 8px);\n    height: 100%;\n    padding: 4px;\n}\n\n\n#booking-dateArea * {\n    width: 100%;\n    height: 100%;\n    font-size: 22px;\n    font-weight: 500;\n    flex-direction: row;\n}\n\n\n#booking-timeArea {\n    width: 100%;\n    min-height: 100px;\n    height: 100px;\n}\n\n.booking-cell {\n    width: 100%;\n    height: calc(100% - 8px) !important;\n    margin: 4px;\n    border-radius: 8px;\n    transition: background-color 0.3s ease;\n}\n\n.booking-cell-active {\n    background-color: #eeeeee;\n    cursor: pointer;\n}\n\n.booking-cell-active:hover {\n    background-color: #cccccc;\n}\n\n\n\n",
        "js": "const MONTHS = [\"January\", \"February\", \"March\", \"April\", \"May\", \"June\", \"July\", \"August\", \"September\", \"October\", \"November\", \"December\"];\nconst DAYSOFWEEK = [\"Sunday\", \"Monday\", \"Tuesday\", \"Wednesday\", \"Thursday\", \"Friday\", \"Saturday\"];\nconst today = new Date();\n\nlet availability = [];\n\n\n\nconsole.log(today.getDate())\n\nshowMonth(today.getMonth(), today.getFullYear())\n\n\ngetAvailability()\n\nfunction getAvailability() {\n    fetch(\"https://automation.harrison-home.co.uk/webhook-test/Testing\", {\n        method: \"POST\",\n        body: JSON.stringify({ test: true })\n    })\n    .then(res => res.json())\n    .then(data => {\n        console.log(\"Response from n8n:\", data);\n    });\n}\n\n\n\nfunction showMonth(monthIndex, year) {\n    const firstDayOfWeek = new Date(year, monthIndex, 1).getDay();\n    const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();\n    document.getElementById(\"booking-monthArea\").innerHTML = `${MONTHS[monthIndex]} ${year}`;\n\n    document.querySelectorAll('.booking-cell').forEach((elem, index) => {\n        if (index - firstDayOfWeek >= 0 && index - firstDayOfWeek < daysInMonth) {\n            elem.classList.add('booking-cell-active');\n            elem.innerHTML = `${index - firstDayOfWeek + 1}<br>•`;\n        }\n    })\n\n    console.log(DAYSOFWEEK[firstDayOfWeek])\n}"
    }
}
		
		const pageHTML = document.getElementById("pageHTML");
		const pageCSS = document.getElementById("pageCSS");
	
		function showPage(pageName, htmlParent=pageHTML, cssParent=pageCSS) {
			if (pages[pageName].html) htmlParent.innerHTML = pages[pageName].html;
			if (pages[pageName].css) cssParent.innerHTML = pages[pageName].css;
			if (pages[pageName].js) new Function(pages[pageName].js)();
		}
	
		showPage("Home");
	
	</script>
</body>
</html>
